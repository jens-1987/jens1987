<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dagens nyheder – DR (marquee)</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(255,255,255,0.06);
      --panel-border: rgba(255,255,255,0.12);
      --text: #f3f4f6;
      --muted: #a1a1aa;
      --accent: #ef4444;
      --ok: #22c55e;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(239,68,68,0.15), transparent 25%),
        radial-gradient(circle at bottom left, rgba(59,130,246,0.12), transparent 25%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .app { display: grid; grid-template-rows: auto 1fr auto; height: 100%; }

    .topbar {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      padding: 16px 18px; border-bottom: 1px solid var(--panel-border);
      background: rgba(11,18,32,0.78); backdrop-filter: blur(10px);
    }

    .brand { font-weight: 700; font-size: 20px; margin-right: 12px; white-space: nowrap; }

    .feed-input { flex: 1 1 360px; min-width: 220px; display: flex; gap: 10px; align-items: center; }

    input[type="text"] {
      width: 100%; padding: 12px 14px; border-radius: 14px;
      border: 1px solid var(--panel-border);
      background: rgba(255,255,255,0.06); color: var(--text);
      outline: none; font-size: 14px;
    }

    button {
      border: 0; border-radius: 14px; padding: 12px 16px;
      background: rgba(255,255,255,0.09); color: var(--text);
      cursor: pointer; font-weight: 600;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    button:hover { transform: translateY(-1px); background: rgba(255,255,255,0.14); }
    button.primary { background: var(--accent); }
    button.primary:hover { background: #dc2626; }

    .presets { display: flex; gap: 8px; align-items: center; }

    .content {
      display: grid; grid-template-columns: 1.25fr 0.75fr; gap: 18px;
      padding: 18px; min-height: 0;
    }

    .panel {
      background: var(--panel); border: 1px solid var(--panel-border);
      border-radius: 24px; overflow: hidden; backdrop-filter: blur(14px);
      min-height: 0;
    }

    .panel-header {
      display: flex; justify-content: space-between; gap: 12px; align-items: center;
      padding: 16px 18px; border-bottom: 1px solid var(--panel-border);
    }

    .panel-title { font-size: 16px; font-weight: 700; }
    .status { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; background: var(--ok);
      box-shadow: 0 0 12px rgba(34,197,94,0.55);
    }

    .stories { padding: 10px 14px 16px; overflow: auto; height: calc(100% - 58px); }

    .story {
      padding: 16px; border-radius: 18px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07); margin-bottom: 12px;
    }

    .story h3 { margin: 0 0 8px; font-size: 19px; }
    .story p { margin: 0 0 10px; color: #d4d4d8; font-size: 14px; }
    .story a { color: #fca5a5; text-decoration: none; font-weight: 600; }

    .meta { color: var(--muted); font-size: 12px; margin-bottom: 8px; }

    .sidebar { display: grid; grid-template-rows: auto auto 1fr; gap: 18px; }

    .big-time { padding: 24px; display: grid; gap: 6px; }
    .clock { font-size: clamp(38px, 7vw, 82px); font-weight: 800; }
    .date { color: var(--muted); font-size: 17px; }

    .tips { padding: 18px 20px; font-size: 14px; color: #d4d4d8; }

    .marquee-wrap {
      position: relative; height: 90px; border-top: 1px solid var(--panel-border);
      background: rgba(0,0,0,0.35); display: flex; align-items: center; overflow: hidden;
    }

    .marquee-label {
      position: absolute; left: 16px; z-index: 2; background: var(--accent);
      color: white; font-weight: 800; border-radius: 999px; padding: 10px 14px;
      text-transform: uppercase; font-size: 12px;
    }

    .marquee {
      white-space: nowrap; display: inline-block; padding-left: 180px;
      font-size: clamp(24px, 2.4vw, 42px); font-weight: 800;
      animation: ticker 45s linear infinite;
    }

    @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    .marquee-item { display: inline-flex; align-items: center; gap: 14px; padding-right: 28px; }
    .dot { color: var(--accent); font-size: 28px; }

    @media (max-width: 1024px) {
      .content { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">Dagens nyheder (DR)</div>

      <div class="feed-input">
        <input id="drUrl" type="text" value="https://www.dr.dk/nyheder/service/feeds/senestenyt" />
        <button class="primary" id="loadBtn">Indlæs DR</button>
      </div>

      <div class="presets">
        <button id="fullscreenBtn">Fullscreen</button>
      </div>
    </div>

    <div class="content">
      <section class="panel">
        <div class="panel-header">
          <div class="panel-title">DR – Seneste nyt</div>
          <div class="status"><span class="status-dot"></span><span id="statusText">Klar</span></div>
        </div>
        <div class="stories" id="stories"></div>
      </section>

      <aside class="sidebar">
        <section class="panel big-time">
          <div class="clock" id="clock">--:--</div>
          <div class="date" id="dateText">--</div>
        </section>

        <section class="panel tips">
          Viser kun DR nyheder – stabil løsning til skærmvisning.
        </section>

        <section class="panel tips" id="debugBox">Status vises her.</section>
      </aside>
    </div>

    <div class="marquee-wrap">
      <div class="marquee-label">Dagens nyt</div>
      <div class="marquee" id="marquee">Indlæser …</div>
    </div>
  </div>

  <script>
    const storiesEl = document.getElementById('stories');
    const marqueeEl = document.getElementById('marquee');
    const statusTextEl = document.getElementById('statusText');
    const drUrlEl = document.getElementById('drUrl');

    function setStatus(text) { statusTextEl.textContent = text; }

    function escapeHtml(str) {
      return str.replace(/[&<>"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[t]));
    }

    function render(items) {
      storiesEl.innerHTML = items.map(item => `
        <div class="story">
          <div class="meta">${item.pubDate || ''}</div>
          <h3>${escapeHtml(item.title)}</h3>
          <p>${escapeHtml(item.description || '')}</p>
          <a href="${item.link}" target="_blank">Åbn</a>
        </div>
      `).join('');

      marqueeEl.innerHTML = [...items, ...items].map(i => `
        <span class="marquee-item">${escapeHtml(i.title)} <span class="dot">•</span></span>
      `).join('');
    }

    async function loadDR() {
      setStatus('Henter DR…');
      try {
        const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(drUrlEl.value)}`;
        const res = await fetch(url);
        const data = await res.json();
        render(data.items.slice(0, 15));
        setStatus('Opdateret');
      } catch {
        setStatus('Fejl ved hentning');
      }
    }

    document.getElementById('loadBtn').onclick = loadDR;

    document.getElementById('fullscreenBtn').onclick = () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    };

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('da-DK');
      document.getElementById('dateText').textContent = now.toLocaleDateString('da-DK');
    }

    setInterval(updateClock, 1000);
    updateClock();

    loadDR();
    setInterval(loadDR, 300000);
  </script>
</body>
</html>
